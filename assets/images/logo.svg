<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Gradient for premium look -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BEB093;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#777669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Medical/Dental Symbol Group -->
  <g transform="translate(60, 60)">
    <!-- Main tooth/medical symbol -->
    <path d="M0,-40 C-8,-40 -12,-35 -15,-28 L-18,-20 C-20,-15 -20,-8 -18,-2 L-12,15 C-10,20 -8,28 -5,35 C-2,42 0,45 0,45 C0,45 2,42 5,35 C8,28 10,20 12,15 L18,-2 C20,-8 20,-15 18,-20 L15,-28 C12,-35 8,-40 0,-40Z" 
          fill="url(#logoGradient)" opacity="0.9"/>
    
    <!-- Crescent accent -->
    <path d="M-8,-30 C-15,-30 -22,-23 -22,-15 C-22,-7 -15,0 -8,0 C-12,-3 -15,-8 -15,-15 C-15,-22 -12,-27 -8,-30Z" 
          fill="#777669" opacity="0.7"/>
    
    <!-- Center line detail -->
    <line x1="0" y1="-35" x2="0" y2="40" stroke="#777669" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Text Group -->
  <g transform="translate(200, 50)">
    <!-- English Name -->
    <text x="0" y="0" font-family="Poppins, sans-serif" font-size="24" font-weight="400" fill="#777669">
      Dr. Islam <tspan font-weight="600">Elsagher</tspan>
    </text>
    
    <!-- Arabic Name -->
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="18" fill="#BEB093">
      دكتور . اسلام الصغير
    </text>
    
    <!-- Professional Title -->
    <text x="0" y="50" font-family="Poppins, sans-serif" font-size="11" fill="#777669" opacity="0.8">
      DENTAL IMPLANTOLOGIST
    </text>
  </g>
</svg>